name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore trampbazaar.sln

      - name: Build API
        run: dotnet build trampbazaar.Api/trampbazaar.Api.csproj --configuration Release --no-restore

      - name: Build Web
        run: dotnet build trampbazaar.Web/trampbazaar.Web.csproj --configuration Release --no-restore

      - name: Build Admin Web
        run: dotnet build trampbazaar.AdminWeb/trampbazaar.AdminWeb.csproj --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test trampbazaar.Tests/trampbazaar.Tests.csproj --configuration Release --no-build
