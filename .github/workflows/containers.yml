name: containers

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/containers.yml"
      - ".dockerignore"
      - "docker-compose.yml"
      - "trampbazaar.Api/**"
      - "trampbazaar.Web/**"
      - "trampbazaar.AdminWeb/**"
      - "trampbazaar.Shared/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: ./trampbazaar.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/trampbazaar-api
          - name: web
            dockerfile: ./trampbazaar.Web/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/trampbazaar-web
          - name: admin
            dockerfile: ./trampbazaar.AdminWeb/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/trampbazaar-adminweb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
