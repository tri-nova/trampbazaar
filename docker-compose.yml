services:
  api:
    build:
      context: .
      dockerfile: trampbazaar.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SqlServer: Server=host.docker.internal,1433;Database=TrampBazaar;User Id=sa;Password=Your_password123;TrustServerCertificate=True
      Auth__SigningKey: change-this-signing-key
      Payments__Provider: demo
      Payments__DefaultSuccessUrl: http://localhost:8081/PaymentSuccess
      Payments__DefaultCancelUrl: http://localhost:8081/PaymentCancel
      Cors__AllowedOrigins__0: http://localhost:8081
      Cors__AllowedOrigins__1: http://localhost:8082
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: trampbazaar.Web/Dockerfile
    depends_on:
      - api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Api__BaseUrl: http://api:8080/
    ports:
      - "8081:8080"

  admin:
    build:
      context: .
      dockerfile: trampbazaar.AdminWeb/Dockerfile
    depends_on:
      - api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Api__BaseUrl: http://api:8080/
    ports:
      - "8082:8080"
